    <!-- Google Fonts - Devanagari -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
    <style>
      html, body, #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #000;
      }

      #boot-shell {
        display: none;
      }

      body.trade-boot #boot-shell {
        position: fixed;
        inset: 0;
        display: block;
        background: #000;
        z-index: 0;
      }

      body.trade-boot #root {
        position: relative;
        z-index: 1;
      }

      .boot-shell-page {
        min-height: 100vh;
        padding: 4px;
        background: #000;
        box-sizing: border-box;
      }

      .boot-shell-topnav {
        height: 52px;
        background: #07080d;
        border-bottom: 1px solid #1b1d24;
      }

      .boot-shell-main {
        margin-top: 4px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 321px 321px;
        gap: 4px;
        height: 608px;
      }

      .boot-shell-chart,
      .boot-shell-book,
      .boot-shell-form,
      .boot-shell-bottom-left,
      .boot-shell-bottom-right {
        background: #121218;
      }

      .boot-shell-chart {
        display: grid;
        grid-template-rows: 32px 25px minmax(0, 1fr);
        gap: 4px;
        background: #000;
      }

      .boot-shell-bar,
      .boot-shell-favorites {
        background: #17181f;
      }

      .boot-shell-bottom {
        margin-top: 4px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 321px;
        gap: 4px;
        height: 392px;
      }
    </style>
  </head>
  <body>
    <script>
      if (window.location.pathname.startsWith("/trade")) {
        document.body.classList.add("trade-boot");
      }
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="boot-shell" aria-hidden="true">
      <div class="boot-shell-page">
        <div class="boot-shell-topnav"></div>
        <div class="boot-shell-main">
          <div class="boot-shell-chart">
            <div class="boot-shell-bar"></div>
            <div class="boot-shell-favorites"></div>
            <div class="boot-shell-bottom-left"></div>
          </div>
          <div class="boot-shell-book"></div>
          <div class="boot-shell-form"></div>
        </div>
        <div class="boot-shell-bottom">
          <div class="boot-shell-bottom-left"></div>
          <div class="boot-shell-bottom-right"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script async src="/charting_library/charting_library.standalone.js"></script>
  </body>
</html>
