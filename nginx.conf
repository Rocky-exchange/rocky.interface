server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy rocky-backend's real routes same-origin, mirroring
    # vite.config.ts's dev proxy. The API upstream sends no CORS headers,
    # so the browser must never call it directly cross-origin; see
    # VITE_USE_SAME_ORIGIN_PROXY in src/shared/config/backend.ts.
    location /v1/ {
        proxy_pass https://api.rockytest.xyz/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.rockytest.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fapi/ {
        proxy_pass https://api.rockytest.xyz/fapi/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.rockytest.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spot (Binance Spot-compatible surface): depth/trades/klines/ticker,
    # session-key, signed order/account routes.
    location /api/v3/ {
        proxy_pass https://api.rockytest.xyz/api/v3/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.rockytest.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass https://api.rockytest.xyz/ws;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.rockytest.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
